<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CAPTAIN BOY | HANGING ART GALLERY</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      #nav-ui {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        z-index: 10000; display: flex; align-items: flex-end; gap: 20px;
        background: rgba(0,0,0,0.4); padding: 20px; border-radius: 30px; backdrop-filter: blur(8px);
      }
      .control-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .nav-row { display: flex; gap: 10px; }
      .btn {
        width: 60px; height: 60px; background: white; border: none; border-radius: 15px; 
        color: #333; font-size: 18px; font-weight: bold; display: flex; 
        justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      }
      .btn:active { background: gold; transform: scale(0.9); }
      .rotate-btn { background: #333; color: gold; border-radius: 50%; }
      #light-toggle {
        position: fixed; top: 20px; right: 20px; z-index: 10000;
        width: 100px; height: 45px; background: gold; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;
      }
    </style>
  </head>
  <body>

    <button id="light-toggle">TẮT ĐÈN</button>

    <div id="nav-ui">
      <div class="btn rotate-btn" id="rot-left">↺</div>
      <div class="control-group">
        <div class="btn" id="up">▲</div>
        <div class="nav-row">
          <div class="btn" id="left">◀</div>
          <div class="btn" id="down">▼</div>
          <div class="btn" id="right">▶</div>
        </div>
      </div>
      <div class="btn rotate-btn" id="rot-right">↻</div>
    </div>

    <a-scene renderer="antialias: true; colorManagement: true;">
      
      <a-assets>
        <img id="asset-standee" src="https://via.placeholder.com/800x1200?text=STANDEE+CENTER">
        <video id="asset-vcr" src="https://www.w3schools.com/html/mov_bbb.mp4" loop="true" crossorigin="anonymous" muted></video>
        <img id="art-portrait" src="https://via.placeholder.com/400x600?text=PORTRAIT">
      </a-assets>

      <!-- ÁNH SÁNG PHÒNG TRANH -->
      <a-light id="main-light" type="ambient" color="#fff" intensity="0.7"></a-light>
      <a-light type="point" position="0 5 0" intensity="0.5" distance="20"></a-light>

      <!-- KIẾN TRÚC PHÒNG (16x16) -->
      <a-sky id="bg-sky" color="#f0f0f0"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="16" height="16" color="#e0e0e0"></a-plane>
      <a-plane position="0 6 0" rotation="90 0 0" width="16" height="16" color="#333"></a-plane> <!-- Trần tối để dây cáp nổi bật -->

      <!-- VÁCH TƯỜNG VÀNG NHẸ LÀM NỀN -->
      <a-box position="-7.9 3 0" rotation="0 90 0" width="16" height="6" depth="0.1" color="#fffde7"></a-box>
      <a-box position="7.9 3 0" rotation="0 -90 0" width="16" height="6" depth="0.1" color="#fffde7"></a-box>
      <a-box position="0 3 -7.9" width="16" height="6" depth="0.1" color="#fffde7"></a-box>

      <!-- 1. ĐIỂM NHẤN KHUNG ĐỎ TRUNG TÂM (RED HERO FRAME) -->
      <a-entity position="0 2.5 -3.5">
         <a-box width="2.2" height="4.2" depth="0.1" color="#e74c3c" material="roughness: 0.2"></a-box>
         <a-image src="#asset-standee" width="1.8" height="3.8" position="0 0 0.06"></a-image>
      </a-entity>

      <!-- 2. MÀN HÌNH CHÍNH Ở TƯỜNG SAU -->
      <a-entity position="0 2.5 -7.8">
        <a-video src="#asset-vcr" width="7" height="4"></a-video>
        <a-box position="0 -2.1 0.05" width="7" height="0.05" depth="0.1" color="gold" material="emissive: gold; emissiveIntensity: 1"></a-box>
      </a-entity>

      <!-- 3. HỆ THỐNG TRANH TREO PHONG CÁCH MỚI (JS TẠO) -->
      <a-entity id="gallery-left"></a-entity>
      <a-entity id="gallery-right"></a-entity>

      <!-- CAMERA RIG -->
      <a-entity id="rig" position="0 0 6" rotation="0 0 0">
        <a-entity id="camera" camera look-controls position="0 1.6 0">
            <a-cursor color="gold" scale="0.5 0.5 0.5"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const galleryLeft = document.getElementById('gallery-left');
      const galleryRight = document.getElementById('gallery-right');

      function buildHangingGallery(parent, side, count) {
        const startZ = -6.5;
        const spacingZ = 1.2;
        const baseOffset = side === 'left' ? -7 : 7;
        const rotY = side === 'left' ? 90 : -90;

        for (let i = 0; i < count; i++) {
          let z = startZ + (i * spacingZ);
          if (z > 7) continue;

          // Tạo hiệu ứng so le nông sâu (depth offset)
          let depthOffset = (i % 2 === 0) ? 0.5 : 1.2;
          let x = side === 'left' ? baseOffset + depthOffset : baseOffset - depthOffset;
          
          // Chiều cao so le
          const yPos = [1.8, 2.8, 3.8];
          let y = yPositions = yPos[i % 3];

          //--- 1. BACKDROP PHỤ (Tấm vách trắng phía sau tranh) ---
          let backdrop = document.createElement('a-plane');
          backdrop.setAttribute('width', '1.2');
          backdrop.setAttribute('height', '1.6');
          backdrop.setAttribute('color', '#ffffff');
          // Backdrop đặt lùi lại một chút so với tranh
          backdrop.setAttribute('position', `${side === 'left' ? x - 0.2 : x + 0.2} ${y} ${z}`);
          backdrop.setAttribute('rotation', `0 ${rotY} 0`);
          backdrop.setAttribute('opacity', '0.7');
          parent.appendChild(backdrop);

          //--- 2. DÂY CÁP TREO (Wire) ---
          let wire = document.createElement('a-entity');
          wire.setAttribute('line', {
            start: `${x} 6 ${z}`, 
            end: `${x} ${y + 0.7} ${z}`, 
            color: '#ffffff'
          });
          parent.appendChild(wire);

          //--- 3. KHUNG TRANH ĐEN & ẢNH ---
          let frame = document.createElement('a-box');
          frame.setAttribute('width', '0.9');
          frame.setAttribute('height', '1.3');
          frame.setAttribute('depth', '0.05');
          frame.setAttribute('color', '#000');
          frame.setAttribute('position', `${x} ${y} ${z}`);
          frame.setAttribute('rotation', `0 ${rotY} 0`);

          let img = document.createElement('a-image');
          img.setAttribute('src', '#art-portrait');
          img.setAttribute('width', '0.8');
          img.setAttribute('height', '1.2');
          img.setAttribute('position', '0 0 0.031'); // Dán lên mặt khung

          frame.appendChild(img);
          parent.appendChild(frame);
        }
      }

      buildHangingGallery(galleryLeft, 'left', 20);
      buildHangingGallery(galleryRight, 'right', 20);

      // --- ĐIỀU KHIỂN ---
      const rig = document.getElementById('rig');
      const camera = document.getElementById('camera');
      const btnLight = document.getElementById('light-toggle');
      let moveDir = null; let rotateDir = null;
      const moveSpeed = 0.15; const rotateSpeed = 1.5;

      function update() {
        if (moveDir) {
          let rotation = camera.getAttribute('rotation');
          let rigRotation = rig.getAttribute('rotation');
          let totalAngle = (rotation.y + rigRotation.y) * (Math.PI / 180);
          let pos = rig.getAttribute('position');
          if (moveDir === 'up') { pos.x -= Math.sin(totalAngle) * moveSpeed; pos.z -= Math.cos(totalAngle) * moveSpeed; }
          if (moveDir === 'down') { pos.x += Math.sin(totalAngle) * moveSpeed; pos.z += Math.cos(totalAngle) * moveSpeed; }
          if (moveDir === 'left') { pos.x -= Math.cos(totalAngle) * moveSpeed; pos.z += Math.sin(totalAngle) * moveSpeed; }
          if (moveDir === 'right') { pos.x += Math.cos(totalAngle) * moveSpeed; pos.z -= Math.sin(totalAngle) * moveSpeed; }
          rig.setAttribute('position', pos);
        }
        if (rotateDir) {
          let rot = rig.getAttribute('rotation');
          if (rotateDir === 'left') rot.y += rotateSpeed;
          if (rotateDir === 'right') rot.y -= rotateSpeed;
          rig.setAttribute('rotation', rot);
        }
        requestAnimationFrame(update);
      }
      update();

      const bind = (id, type, val) => {
        const el = document.getElementById(id);
        const start = (e) => { e.preventDefault(); if(type==='move') moveDir=val; else rotateDir=val; };
        const stop = () => { if(type==='move') moveDir=null; else rotateDir=null; };
        el.addEventListener('mousedown', start); el.addEventListener('touchstart', start);
        window.addEventListener('mouseup', stop); window.addEventListener('touchend', stop);
      };
      bind('up','move','up'); bind('down','move','down');
      bind('left','move','left'); bind('right','move','right');
      bind('rot-left','rotate','left'); bind('rot-right','rotate','right');

      let isOn = true;
      btnLight.addEventListener('click', () => {
        isOn = !isOn;
        document.getElementById('main-light').setAttribute('intensity', isOn ? 0.7 : 0.1);
        btnLight.innerText = isOn ? "TẮT ĐÈN" : "BẬT ĐÈN";
      });
      window.addEventListener('click', () => { document.querySelector('#asset-vcr').play(); }, {once: true});
    </script>
  </body>
</html>
