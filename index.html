<!DOCTYPE html>
<html>
  <head>
    <title>Artist Gallery 3D</title>
    <!-- Thư viện mã nguồn mở từ GitHub của A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- 1. Bầu trời & Ánh sáng -->
      <a-sky color="#111"></a-sky> 
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="point" intensity="1" position="2 4 4"></a-light>

      <!-- 2. Sàn nhà (Backdrop dưới đất) -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#222"></a-plane>

      <!-- 3. Treo tranh lên tường -->
      <!-- Thay link ảnh của bạn vào chỗ 'src' -->
      <a-box position="0 2.5 -5" width="4" height="3" depth="0.1" color="#fff">
        <a-image src="https://via.placeholder.com/400x300" width="3.8" height="2.8" position="0 0 0.06"></a-image>
      </a-box>

      <!-- 4. Làm Standee (Ảnh nghệ sĩ đứng trên sàn) -->
      <!-- Lưu ý: Dùng ảnh PNG xóa phông để đẹp nhất -->
      <a-image src="https://via.placeholder.com/150x300" position="2 1.5 -3" width="1.5" height="3"></a-image>
      <a-box position="2 0.05 -3" width="1.6" height="0.1" depth="0.5" color="#444"></a-box> <!-- Đế standee -->

      <!-- 5. Backdrop phía sau -->
      <a-curvedimage src="https://via.placeholder.com/500x200" height="4.0" radius="5.7" theta-length="72"
                     rotation="0 144 0" position="0 2 0"></a-curvedimage>

      <!-- 6. Người xem có thể đi bộ bằng phím mũi tên và chuột -->
      <a-entity camera look-controls wasd-controls position="0 1.6 3"></a-entity>
    </a-scene>
  </body>
</html>
