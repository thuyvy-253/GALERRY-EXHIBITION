<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CAPTAIN BOY 20.08 | The Memory Hallway</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>

    <a-scene shadow="type: pcfsoft">
      
      <a-assets>
        <!-- Video VCR (Bạn thay link video vào đây) -->
        <!-- Lưu ý: Để video tự chạy trên web, thường phải để muted (tắt tiếng) trước -->
        <video id="vcr-1" src="vcr1.mp4" autoplay loop="true" muted crossorigin="anonymous"></video>
        <video id="vcr-2" src="vcr2.mp4" autoplay loop="true" muted crossorigin="anonymous"></video>
        
        <!-- Ảnh (Thay link ảnh của bạn) -->
        <img id="photo-1" src="https://via.placeholder.com/400x600?text=CAPTAIN+1">
        <img id="photo-2" src="https://via.placeholder.com/400x600?text=CAPTAIN+2">
        <img id="photo-3" src="https://via.placeholder.com/400x600?text=CAPTAIN+3">
        
        <!-- Texture tường/sàn -->
        <img id="marble" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/bricks/brick_diffuse.jpg">
      </a-assets>

      <!-- MÔI TRƯỜNG: Starry night cho sang trọng -->
      <a-entity environment="preset: starry; ground: canyon; groundColor: #000; grid: none"></a-entity>

      <!-- ======================================================== -->
      <!-- HÀNH LANG DẪN LỐI (THE MEMORY HALLWAY) -->
      <!-- Bắt đầu từ Z=15 đến Z=0 -->
      <a-entity position="0 0 0">
        
        <!-- 1. Sàn hành lang (Thảm đỏ hoặc đường dẫn sáng) -->
        <a-plane position="0 0.01 7.5" rotation="-90 0 0" width="4" height="15" color="#111" metalness="0.5"></a-plane>
        <a-light type="rectLight" color="#4facfe" intensity="2" position="0 0.1 7.5" rotation="-90 0 0" width="4" height="15"></a-light>

        <!-- 2. BÊN TRÁI: DÃY VIDEO VCR -->
        <!-- Màn hình 1 -->
        <a-entity position="-2.5 2 12">
            <a-box width="3.2" height="1.9" depth="0.1" color="#000"></a-box> <!-- Khung TV -->
            <a-video src="#vcr-1" width="3" height="1.7" position="0 0 0.06"></a-video>
            <a-light type="point" color="#4facfe" intensity="0.5" position="0 0 1"></a-light>
        </a-entity>

        <!-- Màn hình 2 -->
        <a-entity position="-2.5 2 7">
            <a-box width="3.2" height="1.9" depth="0.1" color="#000"></a-box>
            <a-video src="#vcr-2" width="3" height="1.7" position="0 0 0.06"></a-video>
        </a-entity>

        <!-- 3. BÊN PHẢI: DÃY ẢNH NGHỆ THUẬT -->
        <!-- Ảnh 1 -->
        <a-entity position="2.5 2 12" rotation="0 -20 0">
            <a-box width="2.2" height="3.2" depth="0.1" color="#fff">
                <a-image src="#photo-1" width="2" height="3" position="0 0 0.06"></a-image>
            </a-box>
        </a-entity>

        <!-- Ảnh 2 -->
        <a-entity position="2.5 2 7" rotation="0 -20 0">
            <a-box width="2.2" height="3.2" depth="0.1" color="#fff">
                <a-image src="#photo-2" width="2" height="3" position="0 0 0.06"></a-image>
            </a-box>
        </a-entity>

        <!-- Ảnh 3 -->
        <a-entity position="2.5 2 2" rotation="0 -20 0">
            <a-box width="2.2" height="3.2" depth="0.1" color="#fff">
                <a-image src="#photo-3" width="2" height="3" position="0 0 0.06"></a-image>
            </a-box>
        </a-entity>

      </a-entity>

      <!-- ======================================================== -->
      <!-- SẢNH CHÍNH (MAIN PLAZA) - Xuất hiện sau khi đi hết hành lang -->
      <a-entity position="0 0 -5">
        <!-- Cổng vòm chào mừng -->
        <a-torus color="gold" arc="180" radius="5" radius-tubular="0.05" position="0 0 0" rotation="0 0 0"></a-torus>
        <a-text value="WELCOME TO CAPTAIN'S WORLD" align="center" position="0 6 0" width="12" color="gold" font="exo2bold"></a-text>

        <!-- (Các khu vực khác bạn đã có từ bản trước có thể copy vào đây) -->
        <a-image src="#photo-1" position="0 2.5 -5" width="5" height="7"></a-image>
      </a-entity>

      <!-- ======================================================== -->
      <!-- CAMERA & DI CHUYỂN -->
      <!-- Đặt camera ở Z=18 để người xem bắt đầu từ ngoài hành lang -->
      <a-entity id="rig" movement-controls="speed: 0.2">
        <a-entity camera look-controls position="0 1.6 18">
            <a-cursor color="gold"></a-cursor>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
        // Tự động bật tiếng khi người dùng click vào màn hình (do chính sách trình duyệt)
        document.body.addEventListener('click', function() {
            var v1 = document.querySelector('#vcr-1');
            var v2 = document.querySelector('#vcr-2');
            v1.muted = false;
            v2.muted = false;
            v1.play();
            v2.play();
        }, {once: true});
    </script>
  </body>
</html>
